name: Pages

on:
    push:
        branches:
            - main
        paths:
            - ".github/workflows/pages.yml"
            - "build.gradle"
            - "settings.gradle"
            - "gradle/**"
            - "gradlew"
            - "gradlew.bat"
            - "src/**"
            - "website/**"
            - "package.json"
            - "package-lock.json"
            - "tsconfig.website.json"
            - "build.js"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: npm

            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 11

            - uses: gradle/actions/setup-gradle@v5
              with:
                  gradle-version: wrapper
                  cache-cleanup: never

            - name: Generate website manifest
              run: ./gradlew generateWebsiteManifest

            - name: Install website dependencies
              run: npm ci

            - name: Build website bundle
              run: npm run build:website

            - uses: actions/configure-pages@v5

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: website

            - id: deployment
              uses: actions/deploy-pages@v4
