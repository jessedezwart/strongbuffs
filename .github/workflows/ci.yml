name: CI

on:
    pull_request:
        paths:
            - '.github/workflows/ci.yml'
            - 'build.gradle'
            - 'settings.gradle'
            - 'gradle/**'
            - 'gradlew'
            - 'gradlew.bat'
            - 'config/checkstyle/**'
            - 'src/**'

jobs:
    java:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        env:
            GRADLE_OPTS: "-Dfile.encoding=UTF-8"

        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 11

            - uses: gradle/actions/setup-gradle@v5
              with:
                  gradle-version: wrapper
                  cache-cleanup: never
            - name: Check
              run: ./gradlew check
